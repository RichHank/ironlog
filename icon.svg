<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sunGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ff2aa3"/>
      <stop offset="50%" stop-color="#ff8b39"/>
      <stop offset="100%" stop-color="#fede5d"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2aa3"/>
      <stop offset="100%" stop-color="#00f5ff"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: deep void -->
  <rect width="512" height="512" rx="112" fill="#0a0a0f"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="#1b1f3a" stroke-width="2"/>

  <!-- Retro grid -->
  <g opacity="0.08">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#ff2aa3" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#ff2aa3" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#ff2aa3" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#00f5ff" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#00f5ff" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#00f5ff" stroke-width="1"/>
  </g>

  <!-- Synthwave sun (bottom half) -->
  <circle cx="256" cy="560" r="260" fill="url(#sunGrad)" opacity="0.4" filter="url(#softGlow)"/>

  <!-- Sun slice bars -->
  <g opacity="0.5">
    <rect x="30" y="290" width="452" height="3" rx="1" fill="#0a0a0f"/>
    <rect x="50" y="300" width="412" height="3" rx="1" fill="#0a0a0f"/>
    <rect x="70" y="310" width="372" height="3" rx="1" fill="#0a0a0f"/>
    <rect x="90" y="320" width="332" height="3" rx="1" fill="#0a0a0f"/>
    <rect x="110" y="330" width="292" height="3" rx="1" fill="#0a0a0f"/>
    <rect x="130" y="340" width="252" height="3" rx="1" fill="#0a0a0f"/>
    <rect x="150" y="350" width="212" height="3" rx="1" fill="#0a0a0f"/>
    <rect x="170" y="360" width="172" height="3" rx="1" fill="#0a0a0f"/>
    <rect x="190" y="370" width="132" height="3" rx="1" fill="#0a0a0f"/>
    <rect x="210" y="380" width="92" height="3" rx="1" fill="#0a0a0f"/>
  </g>

  <!-- Barbell bar -->
  <rect x="90" y="242" width="332" height="12" rx="4" fill="url(#barGrad)" filter="url(#neonGlow)"/>

  <!-- Left plates -->
  <rect x="60" y="208" width="40" height="80" rx="10" fill="none" stroke="#ff2aa3" stroke-width="8" filter="url(#neonGlow)"/>
  <rect x="42" y="192" width="28" height="112" rx="8" fill="none" stroke="#ff8b39" stroke-width="6"/>
  <rect x="28" y="180" width="18" height="136" rx="6" fill="none" stroke="#00f5ff" stroke-width="5" filter="url(#neonGlow)"/>

  <!-- Right plates -->
  <rect x="412" y="208" width="40" height="80" rx="10" fill="none" stroke="#ff2aa3" stroke-width="8" filter="url(#neonGlow)"/>
  <rect x="442" y="192" width="28" height="112" rx="8" fill="none" stroke="#ff8b39" stroke-width="6"/>
  <rect x="466" y="180" width="18" height="136" rx="6" fill="none" stroke="#00f5ff" stroke-width="5" filter="url(#neonGlow)"/>

  <!-- Plate clamp lines -->
  <rect x="100" y="234" width="6" height="28" rx="2" fill="#b44dff"/>
  <rect x="406" y="234" width="6" height="28" rx="2" fill="#b44dff"/>

  <!-- Glow under bar -->
  <ellipse cx="256" cy="290" rx="160" ry="12" fill="#ff2aa3" opacity="0.15" filter="url(#softGlow)"/>
</svg>
