<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Face circle -->
  <circle cx="256" cy="256" r="150" fill="#8B5E3C"/>

  <!-- Hair -->
  <ellipse cx="256" cy="130" rx="152" ry="45" fill="#2d1a0e"/>
  <ellipse cx="140" cy="170" rx="40" ry="90" fill="#2d1a0e"/>
  <ellipse cx="372" cy="170" rx="40" ry="90" fill="#2d1a0e"/>

  <!-- Eyes -->
  <ellipse cx="210" cy="245" rx="18" ry="22" fill="#fff"/>
  <circle cx="214" cy="248" r="12" fill="#1a1a1a"/>
  <circle cx="218" cy="243" r="5" fill="#fff"/>

  <ellipse cx="302" cy="245" rx="18" ry="22" fill="#fff"/>
  <circle cx="306" cy="248" r="12" fill="#1a1a1a"/>
  <circle cx="310" cy="243" r="5" fill="#fff"/>

  <!-- Eyebrows -->
  <path d="M188 218 Q210 208 232 218" fill="none" stroke="#2d1a0e" stroke-width="5" stroke-linecap="round"/>
  <path d="M280 218 Q302 208 324 218" fill="none" stroke="#2d1a0e" stroke-width="5" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M190 290 Q256 360 322 290" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="175" cy="285" rx="22" ry="14" fill="#D4756B" opacity="0.45"/>
  <ellipse cx="337" cy="285" rx="22" ry="14" fill="#D4756B" opacity="0.45"/>

  <!-- Nose -->
  <path d="M250 260 Q256 278 262 260" fill="none" stroke="#6B3F1F" stroke-width="4" stroke-linecap="round"/>
</svg>
