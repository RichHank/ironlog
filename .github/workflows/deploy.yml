name: Deploy to GitHub Pages

on:
  push:
    branches: ['vaporwave-ui', 'main']

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy clean gh-pages branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages:gh-pages --force --depth=1
            git worktree add .gh-pages gh-pages
          else
            git worktree add -b gh-pages .gh-pages
          fi

          find .gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. .gh-pages/
          touch .gh-pages/.nojekyll

          cd .gh-pages
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}" || exit 0
          git push origin HEAD:gh-pages
