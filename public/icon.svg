<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="#1e293b" stroke-width="4"/>

  <!-- Dumbbell body - horizontal bar -->
  <rect x="140" y="232" width="232" height="20" rx="4" fill="url(#accent)"/>

  <!-- Left weight plates -->
  <rect x="100" y="188" width="48" height="108" rx="12" fill="none" stroke="url(#accent)" stroke-width="12"/>
  <rect x="85" y="168" width="36" height="148" rx="10" fill="none" stroke="url(#accent)" stroke-width="10"/>
  <rect x="70" y="152" width="24" height="180" rx="8" fill="none" stroke="url(#accent)" stroke-width="8"/>

  <!-- Right weight plates -->
  <rect x="364" y="188" width="48" height="108" rx="12" fill="none" stroke="url(#accent)" stroke-width="12"/>
  <rect x="391" y="168" width="36" height="148" rx="10" fill="none" stroke="url(#accent)" stroke-width="10"/>
  <rect x="418" y="152" width="24" height="180" rx="8" fill="none" stroke="url(#accent)" stroke-width="8"/>

  <!-- Glow effect under bar -->
  <ellipse cx="256" cy="350" rx="100" ry="16" fill="#3b82f6" opacity="0.15"/>
</svg>
